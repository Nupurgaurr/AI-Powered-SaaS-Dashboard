services:
  - type: web
    name: trackai-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: trackai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RATE_LIMIT_MAX
        value: 100
      - key: AI_RATE_LIMIT_MAX
        value: 20

databases:
  - name: trackai-db
    databaseName: trackai
    user: trackai_user
    plan: free
    region: oregon
